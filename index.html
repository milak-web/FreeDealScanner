<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deal Hunter | Free Game Scanner & Price Tracker</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Deal Hunter">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <style>
        .deal-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .deal-card:hover { transform: translateY(-8px); border-color: rgba(234, 179, 8, 0.5); }
        .platform-badge { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .epic-games { background-color: #ffffff; color: #000000; }
        .steam { background-color: #1b2838; color: #66c0f4; border: 1px solid #66c0f4; }
        .gog { background-color: #4b0082; color: #f1f1f1; }
        .playstation { background-color: #003791; color: white; }
        .xbox { background-color: #107c10; color: white; }
        .nintendo { background-color: #e60012; color: white; }
        .google-play { background-color: #34a853; color: white; }
        .apple-app-store { background-color: #007aff; color: white; }
        .ubisoft { background-color: #0070ff; color: white; }
        .rockstar { background-color: #f6931d; color: black; }
        .ea-app { background-color: #f5333f; color: white; }
        .blizzard { background-color: #009ae4; color: white; }
        .other { background-color: #3b3b3b; color: #e5e5e5; }
        .timer-badge { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-yellow-500/30">
    <header class="bg-slate-900/80 backdrop-blur-md shadow-2xl border-b border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-6">
            <div class="flex items-center space-x-3 group cursor-pointer">
                <div class="bg-yellow-500 p-2 rounded-lg group-hover:rotate-12 transition-transform">
                    <i class="fas fa-bolt text-slate-950 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">Deal<span class="text-yellow-500">Hunter</span></h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <div class="relative group">
                    <input type="text" id="searchInput" placeholder="Search Game Prices..."
                        class="bg-slate-800 border border-slate-700 text-slate-100 px-4 py-2 pl-10 rounded-lg text-xs font-bold focus:outline-none focus:border-yellow-500 transition-all w-64 uppercase tracking-widest"
                        autocomplete="off">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs group-focus-within:text-yellow-500 transition-colors"></i>
                    <div id="suggestionsDropdown" class="absolute top-full left-0 right-0 mt-2 bg-slate-900 border border-slate-700 rounded-lg shadow-2xl z-[60] hidden overflow-hidden"></div>
                </div>

                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button onclick="setFilter('all')" id="filter-all" class="filter-btn active px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest transition">All</button>
                    <button onclick="setFilter('Epic Games')" id="filter-epic" class="filter-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest transition">Epic</button>
                    <button onclick="setFilter('Steam')" id="filter-steam" class="filter-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest transition">Steam</button>
                    <button onclick="setFilter('GOG')" id="filter-gog" class="filter-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest transition">GOG</button>
                    <button onclick="setFilter('Mobile')" id="filter-mobile" class="filter-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-widest transition">Mobile</button>
                </div>

                <button id="notifyBtn" onclick="toggleNotifications()" class="bg-slate-800 hover:bg-slate-700 text-slate-100 px-4 py-2 rounded-lg font-black border border-slate-700 transition-all flex items-center space-x-2 active:scale-95">
                    <i class="fas fa-bell text-yellow-500" id="notifyIcon"></i>
                    <span class="hidden sm:inline uppercase text-xs">Notify Me</span>
                </button>

                <button id="refreshBtn" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 px-6 py-2 rounded-lg font-black transition-all flex items-center space-x-2 active:scale-95">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i>
                    <span class="hidden sm:inline uppercase text-xs">Scan Now</span>
                </button>
                <button onclick="toggleWatchlist()" id="watchlistBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-100 px-4 py-2 rounded-lg font-black border border-slate-700 transition-all flex items-center space-x-2 active:scale-95 relative">
                    <i class="fas fa-bookmark text-yellow-500"></i>
                    <span class="hidden sm:inline uppercase text-xs">Watchlist</span>
                    <span id="watchlistCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900 hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10">
        <div id="watchlistSection" class="mb-16 hidden">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-black uppercase tracking-widest italic flex items-center gap-3">
                    <i class="fas fa-star text-yellow-500"></i>
                    My Watchlist
                </h2>
                <button onclick="toggleWatchlist()" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 hover:text-white transition">Close</button>
            </div>
            <div id="watchlistGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Watchlist items will be inserted here -->
            </div>
            <div id="emptyWatchlist" class="text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-800 hidden">
                <p class="text-slate-500 uppercase text-xs font-bold tracking-widest">Your watchlist is empty. Star some deals to save them here!</p>
            </div>
        </div>

        <div id="searchResultsSection" class="mb-16 hidden">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-black uppercase tracking-widest italic flex items-center gap-3">
                    <i class="fas fa-search-dollar text-yellow-500"></i>
                    Price Comparison <span class="text-slate-600 text-xs not-italic" id="searchQueryText"></span>
                </h2>
                <button onclick="clearSearch()" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 hover:text-white transition">Clear Search</button>
            </div>
            <div id="searchResultsGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-8"></div>
        </div>

        <div id="stats" class="mb-10 flex flex-wrap items-center gap-4">
            <!-- Stats will be inserted here -->
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-40 space-y-6">
            <div class="relative">
                <div class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-20"></div>
                <div class="relative rounded-full h-16 w-16 border-4 border-yellow-500 border-t-transparent animate-spin"></div>
            </div>
            <p class="text-slate-400 font-bold tracking-[0.2em] uppercase text-sm">Synchronizing with store servers...</p>
        </div>

        <div id="dealsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden">
            <!-- Deals will be inserted here -->
        </div>

        <div id="noDeals" class="text-center py-40 hidden">
            <div class="bg-slate-900 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-800">
                <i class="fas fa-radar text-4xl text-slate-700 animate-pulse"></i>
            </div>
            <p class="text-xl text-slate-500 font-bold uppercase tracking-widest">No signals detected in this sector</p>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-8 mt-auto">
        <div class="container mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4 text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">
            <p>&copy; 2026 DealHunter // Full-Stack JS Engine</p>
            <p>Last Sync: <span id="lastUpdated" class="text-yellow-500">Initializing...</span></p>
        </div>
    </footer>

    <script>
        dayjs.extend(window.js_plugin_relativeTime || window.dayjs_plugin_relativeTime);
        let allDeals = [];
        let currentFilter = 'all';
        let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
        let notificationsEnabled = localStorage.getItem('notificationsEnabled') === 'true';

        const dealsGrid = document.getElementById('dealsGrid');
        const loading = document.getElementById('loading');
        const noDeals = document.getElementById('noDeals');
        const stats = document.getElementById('stats');
        const lastUpdated = document.getElementById('lastUpdated');
        const searchInput = document.getElementById('searchInput');
        const searchResultsSection = document.getElementById('searchResultsSection');
        const searchResultsGrid = document.getElementById('searchResultsGrid');
        const searchQueryText = document.getElementById('searchQueryText');
        const suggestionsDropdown = document.getElementById('suggestionsDropdown');
        const refreshBtn = document.getElementById('refreshBtn');
        const refreshIcon = document.getElementById('refreshIcon');
        const watchlistSection = document.getElementById('watchlistSection');
        const watchlistGrid = document.getElementById('watchlistGrid');
        const emptyWatchlist = document.getElementById('emptyWatchlist');
        const watchlistCount = document.getElementById('watchlistCount');
        let debounceTimer;

        // Robust environment detection for GitHub Pages
        const isGitHubPages = window.location.hostname.includes('github.io') || window.location.pathname.includes('/FreeDealScanner');
        let isStaticMode = isGitHubPages;

        function parseDealExpiry(value) {
            if (!value || typeof value !== 'string') return null;

            const direct = new Date(value);
            if (!Number.isNaN(direct.getTime())) return direct;

            const clean = value.replace(/\s+/g, ' ').trim().toLowerCase();
            const dayMonthMatch = clean.match(/^(\d{1,2})\s+([a-z]{3,9})\s*@\s*(\d{1,2}):(\d{2})\s*(am|pm)$/i);
            const monthDayMatch = clean.match(/^([a-z]{3,9})\s+(\d{1,2})\s*@\s*(\d{1,2}):(\d{2})\s*(am|pm)$/i);
            const match = dayMonthMatch || monthDayMatch;
            if (!match) return null;

            const months = {
                jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5,
                jul: 6, aug: 7, sep: 8, sept: 8, oct: 9, nov: 10, dec: 11
            };
            const hasDayFirst = Boolean(dayMonthMatch);
            const day = Number(hasDayFirst ? match[1] : match[2]);
            const monthText = (hasDayFirst ? match[2] : match[1]).slice(0, 4).toLowerCase();
            const month = months[monthText] ?? months[monthText.slice(0, 3)];
            const hour12 = Number(match[3]);
            const minute = Number(match[4]);
            const ampm = match[5].toLowerCase();
            if (month === undefined) return null;

            let hour24 = hour12 % 12;
            if (ampm === 'pm') hour24 += 12;

            const now = new Date();
            let year = now.getFullYear();
            let parsed = new Date(year, month, day, hour24, minute, 0, 0);
            if (parsed.getTime() < now.getTime() - (24 * 60 * 60 * 1000)) {
                year += 1;
                parsed = new Date(year, month, day, hour24, minute, 0, 0);
            }
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(debounceTimer);

            if (query.length < 2) {
                suggestionsDropdown.classList.add('hidden');
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    let suggestions = [];
                    if (isStaticMode) {
                        const response = await fetch(`https://www.cheapshark.com/api/1.0/games?title=${encodeURIComponent(query)}&limit=5`);
                        if (response.ok) {
                            const data = await response.json();
                            suggestions = data.map(g => g.external);
                        }
                    } else {
                        const response = await fetch(`./api/suggestions?q=${encodeURIComponent(query)}`);
                        if (response.ok) {
                            suggestions = await response.json();
                        } else {
                            const csResponse = await fetch(`https://www.cheapshark.com/api/1.0/games?title=${encodeURIComponent(query)}&limit=5`);
                            if (csResponse.ok) {
                                const csData = await csResponse.json();
                                suggestions = csData.map(g => g.external);
                            }
                        }
                    }

                    if (suggestions && suggestions.length > 0) {
                        suggestionsDropdown.innerHTML = '';
                        suggestions.forEach(suggestion => {
                            const div = document.createElement('div');
                            div.className = 'px-4 py-3 text-[10px] font-black uppercase tracking-widest text-slate-300 hover:bg-yellow-500 hover:text-slate-950 cursor-pointer border-b border-slate-800 last:border-0 transition-colors';
                            div.innerText = suggestion;
                            div.onclick = () => {
                                searchInput.value = suggestion;
                                suggestionsDropdown.classList.add('hidden');
                                performSearch(suggestion);
                            };
                            suggestionsDropdown.appendChild(div);
                        });
                        suggestionsDropdown.classList.remove('hidden');
                    } else {
                        suggestionsDropdown.classList.add('hidden');
                    }
                } catch (err) {
                    console.error('Suggestion error:', err);
                    suggestionsDropdown.classList.add('hidden');
                }
            }, 300);
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsDropdown.contains(e.target)) {
                suggestionsDropdown.classList.add('hidden');
            }
        });

        function updateWatchlistUI() {
            watchlistCount.innerText = watchlist.length;
            if (watchlist.length > 0) {
                watchlistCount.classList.remove('hidden');
                emptyWatchlist.classList.add('hidden');
            } else {
                watchlistCount.classList.add('hidden');
                emptyWatchlist.classList.remove('hidden');
            }
            
            watchlistGrid.innerHTML = '';
            watchlist.forEach(deal => {
                const card = createDealCard(deal, true);
                watchlistGrid.appendChild(card);
            });
        }

        function toggleWatchlist() {
            watchlistSection.classList.toggle('hidden');
            if (!watchlistSection.classList.contains('hidden')) {
                updateWatchlistUI();
                watchlistSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function isSaved(link) {
            return watchlist.some(d => d.link === link);
        }

        function toggleSave(link) {
            const deal = allDeals.find(d => d.link === link) || watchlist.find(d => d.link === link);
            if (!deal) return;

            if (isSaved(link)) {
                watchlist = watchlist.filter(d => d.link !== link);
            } else {
                watchlist.push(deal);
            }
            
            localStorage.setItem('watchlist', JSON.stringify(watchlist));
            updateWatchlistUI();
            filterAndDisplay(); // Refresh main grid to update star icons
        }

        async function toggleNotifications() {
            if (!("Notification" in window)) {
                alert("This browser does not support desktop notification");
                return;
            }

            if (Notification.permission === "default") {
                const permission = await Notification.requestPermission();
                if (permission !== "granted") return;
            }

            notificationsEnabled = !notificationsEnabled;
            localStorage.setItem('notificationsEnabled', notificationsEnabled);
            updateNotifyUI();

            if (notificationsEnabled) {
                new Notification("DealHunter Notifications Active!", {
                    body: "We'll notify you daily about new 100% off deals and expiring games.",
                    icon: "https://cdn-icons-png.flaticon.com/512/3081/3081840.png"
                });
                scheduleDailyCheck();
            }
        }

        function updateNotifyUI() {
            const notifyBtn = document.getElementById('notifyBtn');
            const notifyIcon = document.getElementById('notifyIcon');
            const notifyText = notifyBtn.querySelector('span');

            if (notificationsEnabled) {
                notifyBtn.classList.remove('bg-slate-800');
                notifyBtn.classList.add('bg-yellow-500', 'text-slate-950');
                notifyIcon.classList.remove('text-yellow-500');
                notifyIcon.classList.add('text-slate-950');
                notifyText.innerText = 'NOTIFICATIONS ON';
            } else {
                notifyBtn.classList.add('bg-slate-800');
                notifyBtn.classList.remove('bg-yellow-500', 'text-slate-950');
                notifyIcon.classList.add('text-yellow-500');
                notifyIcon.classList.remove('text-slate-950');
                notifyText.innerText = 'NOTIFY ME';
            }
        }

        function scheduleDailyCheck() {
            // Simple daily check: check every 12 hours
            setInterval(checkAndNotify, 12 * 60 * 60 * 1000);
            // Also run once now if enabled
            if (notificationsEnabled) checkAndNotify();
        }

        function checkAndNotify() {
            if (!notificationsEnabled || allDeals.length === 0) return;

            const now = dayjs();
            const expiringSoon = allDeals.filter(d => {
                if (!d.expiryDate) return false;
                const end = dayjs(d.expiryDate);
                return end.isValid() && end.diff(now, 'hour') < 24 && end.isAfter(now);
            });

            if (expiringSoon.length > 0) {
                new Notification("Deals Expiring Soon!", {
                    body: `${expiringSoon.length} games are expiring within 24 hours. Claim them now!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/3081/3081840.png"
                });
            }
        }

        async function copyToClipboard(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                btn.classList.add('bg-green-600', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('bg-green-600', 'text-white');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        function createDealCard(deal, isWatchlistCard = false) {
            const card = document.createElement('div');
            card.className = 'bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 flex flex-col deal-card shadow-2xl';
            
            const platformClass = getPlatformClass(deal.platform);
            const saved = isSaved(deal.link);
            
            // Add Subscription Required badge if needed
            let subBadge = '';
            if (deal.category === "Subscription Required") {
                subBadge = `<span class="bg-indigo-600/20 text-indigo-400 border border-indigo-600/30 text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-wider mt-2 inline-block">Subscription Required</span>`;
            }

            card.innerHTML = `
                <div class="h-44 bg-slate-800 relative overflow-hidden group">
                    ${deal.imageUrl ? 
                        `<img src="${deal.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x200/1e293b/64748b?text=Image+Unavailable'">` : 
                        `<div class="w-full h-full flex items-center justify-center bg-slate-800"><i class="fas fa-gamepad text-4xl text-slate-700"></i></div>`
                    }
                    <div class="absolute top-4 left-4 flex flex-col gap-2">
                        <span class="platform-badge ${platformClass}">${deal.platform}</span>
                    </div>
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button onclick="toggleSave('${deal.link}')" class="bg-slate-900/80 backdrop-blur-sm p-2 rounded-lg border border-slate-700 hover:border-yellow-500 transition-colors ${saved ? 'text-yellow-500' : 'text-slate-400'}">
                            <i class="${saved ? 'fas' : 'far'} fa-star"></i>
                        </button>
                        <button onclick="copyToClipboard('${deal.link}', this)" class="bg-slate-900/80 backdrop-blur-sm p-2 rounded-lg border border-slate-700 hover:border-yellow-500 transition-colors text-slate-400">
                            <i class="fas fa-link"></i>
                        </button>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-slate-950 to-transparent h-20"></div>
                </div>
                <div class="p-6 flex-grow flex flex-col">
                    <h3 class="text-base font-black leading-tight mb-4 h-12 line-clamp-2 uppercase tracking-tight">${deal.title}</h3>
                    ${subBadge}
                    <div class="mt-auto space-y-4">
                        ${deal.expiryDate ? `
                        <div class="flex items-center justify-between bg-slate-950/50 p-2 rounded-lg border border-slate-800/50">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">${deal.platform === 'Steam' ? 'Ends' : 'Time Left'}</span>
                            <span class="text-xs text-yellow-500 countdown-timer font-bold" data-expiry="${deal.expiryDate}">--:--:--</span>
                        </div>` : ''}

                        <div class="flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-slate-500 line-through font-bold">${deal.originalPrice || 'N/A'}</span>
                                <span class="text-xl font-black text-yellow-500 italic tracking-tighter">FREE</span>
                            </div>
                            <a href="${deal.link}" target="_blank" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 px-6 py-2 rounded-lg font-black uppercase text-[10px] tracking-widest transition-all active:scale-95">Claim</a>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        async function performSearch(query) {
            if (!query || query.length < 2) return;

            try {
                searchResultsSection.classList.remove('hidden');
                searchQueryText.textContent = `// searching for "${query}"...`;
                searchResultsGrid.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center space-y-4">
                        <div class="h-8 w-8 border-2 border-yellow-500 border-t-transparent animate-spin rounded-full"></div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Retrieving prices from authorized retailers...</p>
                    </div>
                `;

                let results = [];
                if (isStaticMode) {
                    results = await performCheapSharkSearch(query);
                } else {
                    const response = await fetch(`./api/search?q=${encodeURIComponent(query)}`);
                    if (response.ok) {
                        results = await response.json();
                    } else {
                        results = await performCheapSharkSearch(query);
                    }
                }

                if (!results || results.length === 0) {
                    throw new Error('No results found');
                }

                searchQueryText.textContent = `// found ${results.length} ${results.length === 1 ? 'match' : 'matches'}`;
                displaySearchResults(results);
            } catch (error) {
                console.error('Search Error:', error);
                searchQueryText.textContent = `// ${error.message || 'error searching'}`;
                displaySearchResults([]);
            }
        }

        async function performCheapSharkSearch(query) {
            const results = [];
            const gamesResponse = await fetch(`https://www.cheapshark.com/api/1.0/games?title=${encodeURIComponent(query)}&limit=6`);
            if (gamesResponse.ok) {
                const games = await gamesResponse.json();

                const storeMap = {
                    "1": "Steam", "2": "GamersGate", "3": "GreenManGaming", "7": "GOG",
                    "11": "Humble Store", "13": "Ubisoft Connect", "15": "Fanatical",
                    "21": "WinGameStore", "23": "GameBillet", "25": "Epic Games Store",
                    "27": "Gamesplanet", "28": "Gamesload", "29": "2Game", "30": "IndieGala",
                    "35": "DreamGame"
                };

                for (const game of games) {
                    try {
                        const infoResponse = await fetch(`https://www.cheapshark.com/api/1.0/games?id=${game.gameID}`);
                        if (infoResponse.ok) {
                            const info = await infoResponse.json();
                            const deals = info.deals.map(d => ({
                                store: storeMap[d.storeID] || "Other Authorized Store",
                                price: `$${d.price}`,
                                retailPrice: `$${d.retailPrice}`,
                                savings: `${Math.round(parseFloat(d.savings))}%`,
                                link: `https://www.cheapshark.com/redirect?dealID=${d.dealID}`
                            })).sort((a, b) => parseFloat(a.price.replace('$', '')) - parseFloat(b.price.replace('$', '')));

                            results.push({
                                gameID: game.gameID,
                                title: game.external,
                                imageUrl: game.thumb,
                                cheapestPriceEver: `$${info.cheapestPriceEver?.price || 'N/A'}`,
                                deals
                            });
                        }
                    } catch (e) {
                        console.error('Error fetching game info:', e);
                    }
                }
            }
            return results;
        }

        function displaySearchResults(results) {
            if (!results || results.length === 0) {
                searchResultsGrid.innerHTML = `
                    <div class="col-span-full py-10 text-center border border-dashed border-slate-800 rounded-2xl">
                        <p class="text-xs font-bold uppercase tracking-widest text-slate-600 italic">No reliable data found for this target</p>
                    </div>
                `;
                return;
            }

            searchResultsGrid.innerHTML = '';
            results.forEach(game => {
                const card = document.createElement('div');
                card.className = 'bg-slate-900/50 border border-slate-800 rounded-2xl p-6 flex flex-col sm:flex-row gap-6 hover:border-yellow-500/30 transition-all overflow-hidden';
                const topDeals = game.deals.slice(0, 8);

                card.innerHTML = `
                    <div class="w-32 h-44 flex-shrink-0 bg-slate-800 rounded-xl overflow-hidden shadow-2xl mx-auto sm:mx-0">
                        <img src="${game.imageUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150x200/1e293b/64748b?text=N/A'">
                    </div>
                    <div class="flex-grow flex flex-col min-w-0">
                        <div class="flex justify-between items-start mb-4 gap-4">
                            <h3 class="text-sm font-black uppercase tracking-tight italic truncate" title="${game.title}">${game.title}</h3>
                            <span class="text-[9px] font-black text-slate-600 uppercase bg-slate-800 px-2 py-0.5 rounded flex-shrink-0">ID: ${game.gameID}</span>
                        </div>
                        <div class="space-y-2 mb-4 overflow-y-auto max-h-48 pr-2 custom-scrollbar">
                            ${topDeals.map(deal => `
                                <div class="flex items-center justify-between group/row gap-4">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter truncate" title="${deal.store}">${deal.store}</span>
                                    <div class="flex items-center gap-3 flex-shrink-0">
                                        <span class="text-[9px] font-black text-green-500/50 line-through">${deal.retailPrice}</span>
                                        <span class="text-xs font-black text-slate-100 italic">${deal.price}</span>
                                        <a href="${deal.link}" target="_blank" class="text-[10px] bg-slate-800 hover:bg-yellow-500 hover:text-slate-950 px-3 py-1 rounded font-black uppercase transition-colors">Buy</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-auto pt-4 border-t border-slate-800 flex justify-between items-center gap-4">
                            <div class="flex flex-col flex-shrink-0">
                                <span class="text-[9px] font-black text-slate-600 uppercase tracking-widest">Cheapest Ever</span>
                                <span class="text-xs font-black text-yellow-500 italic">${game.cheapestPriceEver}</span>
                            </div>
                            <span class="text-[9px] font-black text-green-500 uppercase tracking-widest flex-shrink-0">${game.deals[0]?.savings || '0%'} OFF</span>
                        </div>
                    </div>
                `;
                searchResultsGrid.appendChild(card);
            });
        }

        function clearSearch() {
            searchResultsSection.classList.add('hidden');
            searchInput.value = '';
            suggestionsDropdown.classList.add('hidden');
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(searchInput.value);
        });


        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-yellow-500', 'text-slate-950');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`filter-${filter.toLowerCase().replace(' ', '')}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('bg-yellow-500', 'text-slate-950');
            }
            filterAndDisplay();
        }

        async function fetchDeals() {
            loading.classList.remove('hidden');
            dealsGrid.classList.add('hidden');
            noDeals.classList.add('hidden');
            refreshBtn.disabled = true;
            refreshIcon.classList.add('animate-spin');

            try {
                const cacheBust = 't=' + Date.now();
                let data;

                // On local/server mode, try live API first so "Scan Now" actually rescans.
                if (!isStaticMode) {
                    const liveResponse = await fetch('/api/deals?' + cacheBust);
                    if (liveResponse.ok) {
                        const liveDeals = await liveResponse.json();
                        data = {
                            lastUpdated: new Date().toISOString(),
                            deals: Array.isArray(liveDeals) ? liveDeals : []
                        };
                    } else {
                        throw new Error(`Live API failed with status ${liveResponse.status}`);
                    }
                } else {
                    const response = await fetch('./data/deals.json?' + cacheBust);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    data = await response.json();
                }

                allDeals = data.deals || (Array.isArray(data) ? data : []);
                lastUpdated.textContent = data.lastUpdated ? dayjs(data.lastUpdated).fromNow() : 'Just now';

                filterAndDisplay(); // Use the function that applies the current filter
            } catch (error) {
                console.error("Error fetching deals:", error);
                // Fallback to static JSON when API is unavailable.
                try {
                    const fallback = await fetch('./data/deals.json?t=' + Date.now());
                    if (!fallback.ok) throw new Error('Fallback static file unavailable');
                    const fallbackData = await fallback.json();
                    allDeals = fallbackData.deals || (Array.isArray(fallbackData) ? fallbackData : []);
                    lastUpdated.textContent = fallbackData.lastUpdated ? dayjs(fallbackData.lastUpdated).fromNow() : 'Just now';
                    isStaticMode = true;
                    filterAndDisplay();
                } catch (fallbackError) {
                    console.error("Fallback error:", fallbackError);
                    dealsGrid.classList.add('hidden');
                    noDeals.classList.remove('hidden');
                    const noDealsMsg = noDeals.querySelector('p');
                    if (noDealsMsg) {
                        noDealsMsg.innerText = "No live API or static data found.";
                    }
                }
            } finally {
                loading.classList.add('hidden');
                refreshBtn.disabled = false;
                refreshIcon.classList.remove('animate-spin');
            }
        }

        function getPlatformClass(platform) {
            const p = platform.toLowerCase();
            if (p.includes('epic')) return 'epic-games';
            if (p.includes('steam')) return 'steam';
            if (p.includes('gog')) return 'gog';
            if (p.includes('playstation')) return 'playstation';
            if (p.includes('xbox')) return 'xbox';
            if (p.includes('nintendo')) return 'nintendo';
            if (p.includes('google')) return 'google-play';
            if (p.includes('apple')) return 'apple-app-store';
            if (p.includes('ubisoft')) return 'ubisoft';
            if (p.includes('rockstar')) return 'rockstar';
            if (p.includes('ea app') || p.includes('origin')) return 'ea-app';
            if (p.includes('blizzard')) return 'blizzard';
            return 'other';
        }

        function updateCountdown() {
            document.querySelectorAll('.countdown-timer').forEach(el => {
                const expiry = el.getAttribute('data-expiry');
                if (!expiry) return;
                
                const parsedExpiry = parseDealExpiry(expiry);
                const end = parsedExpiry ? dayjs(parsedExpiry.toISOString()) : dayjs(expiry);
                
                if (parsedExpiry || end.isValid()) {
                    const now = dayjs();
                    const diff = end.diff(now);
                    
                    if (diff <= 0) {
                        el.innerHTML = '<span class="text-red-500">EXPIRED</span>';
                        return;
                    }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const secs = Math.floor((diff % (1000 * 60)) / 1000);

                    el.innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
                } else {
                    el.innerHTML = expiry;
                    el.classList.remove('text-yellow-500');
                    el.classList.add('text-slate-300');
                }
            });
        }

        function filterAndDisplay() {
            const now = new Date();
            let filtered = allDeals.filter(d => {
                if (!d.expiryDate) return true; // Keep deals without expiry (assume active)

                const parsed = parseDealExpiry(d.expiryDate);
                if (!parsed) return false;
                return parsed > now;
            });

            if (currentFilter === 'Mobile') {
                filtered = filtered.filter(d => d.platform.toLowerCase().includes('google') || d.platform.toLowerCase().includes('apple') || d.category === 'Mobile');
            } else if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.platform.includes(currentFilter));
            }
            displayDeals(filtered);
        }

        function displayDeals(deals) {
            loading.classList.add('hidden');
            
            if (!deals || deals.length === 0) {
                dealsGrid.classList.add('hidden');
                noDeals.classList.remove('hidden');
                stats.innerHTML = '';
                return;
            }

            dealsGrid.innerHTML = '';
            dealsGrid.classList.remove('hidden');
            noDeals.classList.add('hidden');

            const platformCounts = {};
            
            deals.forEach(deal => {
                platformCounts[deal.platform] = (platformCounts[deal.platform] || 0) + 1;
                const card = createDealCard(deal);
                dealsGrid.appendChild(card);
            });

            stats.innerHTML = '';
            const allBtn = document.createElement('div');
            allBtn.className = 'bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 flex items-center space-x-3 shadow-lg';
            allBtn.innerHTML = `
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Total Found</span>
                <span class="text-lg font-black text-yellow-500">${deals.length}</span>
            `;
            stats.appendChild(allBtn);

            Object.entries(platformCounts).forEach(([platform, count]) => {
                const badge = document.createElement('div');
                badge.className = 'bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 flex items-center space-x-3 shadow-lg';
                badge.innerHTML = `
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">${platform}</span>
                    <span class="text-lg font-black text-white">${count}</span>
                `;
                stats.appendChild(badge);
            });
        }

        refreshBtn.addEventListener('click', fetchDeals);
        setInterval(updateCountdown, 1000);
        fetchDeals();
        setFilter('all');
        updateNotifyUI();
        if (notificationsEnabled) scheduleDailyCheck();
    </script>
</body>
</html>
